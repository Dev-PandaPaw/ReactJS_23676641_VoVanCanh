<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge1</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #222;
        color: #eee;
        min-height: 100vh;
        padding: 24px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
      }

      .btn {
        border: none;
        background-color: #eee;
        color: #222;
        font-size: 18px;
        padding: 10px 18px;
        cursor: pointer;
      }

      .number {
        width: 15rem;
        margin: 0 auto 28px;
        text-align: center;
        background-color: #eee;
        color: #222;
        font-size: 44px;
        padding: 14px;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        max-width: 760px;
        margin: 0 auto;
        align-items: start;
      }

      .guess {
        width: 100%;
        border: 3px solid #eee;
        background: transparent;
        color: inherit;
        font-size: 34px;
        padding: 14px;
        margin-bottom: 14px;
        text-align: center;
      }

      .message {
        margin-bottom: 16px;
        min-height: 24px;
        font-size: 22px;
      }

      .label-score,
      .label-highscore {
        margin-bottom: 10px;
        font-size: 20px;
      }

      @media (max-width: 700px) {
        .main {
          grid-template-columns: 1fr;
        }

        .number {
          width: 12rem;
        }
      }
    </style>
  </head>

  <body>
    <header class="top">
      <button class="btn again">Chơi lại!</button>
      <p>(Từ 1 đến 20)</p>
    </header>

    <h1 style="text-align: center; margin-bottom: 20px">Đoán số nào!</h1>
    <div class="number">?</div>

    <main class="main">
      <section>
        <input type="number" class="guess" min="1" max="20" />
        <button class="btn check">Đoán!</button>
      </section>

      <section>
        <p class="message">Bắt đầu đoán...</p>
        <p class="label-score">Điểm: <span class="score">20</span></p>
        <p class="label-highscore">
          Điểm cao: <span class="highscore">0</span>
        </p>
      </section>
    </main>

    <script>
      let soBiMat = Math.trunc(Math.random() * 20) + 1;
      let diem = 20;
      let diemCao = 0;

      const hienThiThongBao = function (thongBao) {
        document.querySelector(".message").textContent = thongBao;
      };

      document.querySelector(".check").addEventListener("click", function () {
        const soDoan = Number(document.querySelector(".guess").value);

        if (!soDoan) {
          hienThiThongBao("Nhập số đi!");
          return;
        }

        if (soDoan === soBiMat) {
          hienThiThongBao("Chính xác!");
          document.querySelector(".number").textContent = soBiMat;
          document.body.style.backgroundColor = "#60b347";
          document.querySelector(".number").style.width = "30rem";

          if (diem > diemCao) {
            diemCao = diem;
            document.querySelector(".highscore").textContent = diemCao;
          }
          return;
        }

        if (diem > 1) {
          hienThiThongBao(soDoan > soBiMat ? "Quá cao!" : "Quá thấp!");
          diem--;
          document.querySelector(".score").textContent = diem;
        } else {
          hienThiThongBao("Bạn thua rồi!");
          diem = 0;
          document.querySelector(".score").textContent = diem;
        }
      });

      // Reset trạng thái game khi bấm Chơi lại
      document.querySelector(".again").addEventListener("click", function () {
        diem = 20;
        soBiMat = Math.trunc(Math.random() * 20) + 1;

        hienThiThongBao("Bắt đầu đoán...");
        document.querySelector(".score").textContent = diem;
        document.querySelector(".number").textContent = "?";
        document.querySelector(".guess").value = "";

        document.body.style.backgroundColor = "#222";
        document.querySelector(".number").style.width = "15rem";
      });
    </script>
  </body>
</html>
