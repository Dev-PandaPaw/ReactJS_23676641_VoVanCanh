<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge3</title>
  </head>

  <body>
    <script>
      //theo đề
      const gameEvents = new Map([
        [17, "⚽ GOAL"],
        [36, "🔁 Substitution"],
        [47, "⚽ GOAL"],
        [61, "🔁 Substitution"],
        [64, "🔶 Yellow card"],
        [69, "🔴 Red card"],
        [70, "🔁 Substitution"],
        [72, "🔁 Substitution"],
        [76, "⚽ GOAL"],
        [80, "⚽ GOAL"],
        [92, "🔶 Yellow card"],
      ]);

      // xoa the vang phut 64
      gameEvents.delete(64);

      // lay su kien khong bi trung
      const events = [...new Set(gameEvents.values())];
      console.log(events);

      // tinh trung binh bao nhieu phut co 1 su kien
      const lastMinute = [...gameEvents.keys()].pop();
      const average = lastMinute / gameEvents.size;
      console.log(`An event happened, on average, every ${average} minutes`);

      // in tung su kien theo hiep
      for (const [minute, event] of gameEvents) {
        const half = minute <= 45 ? "FIRST" : "SECOND";
        console.log(`[${half} HALF] ${minute}: ${event}`);
      }
    </script>
  </body>
</html>
