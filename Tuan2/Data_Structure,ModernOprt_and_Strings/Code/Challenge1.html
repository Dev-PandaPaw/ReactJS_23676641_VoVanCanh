<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge1</title>
  </head>

  <body>
    <script>
      const game = {
        team1: "Bayern Munich",
        team2: "Borrussia Dortmund",
        players: [
          [
            "Neuer",
            "Pavard",
            "Martinez",
            "Alaba",
            "Davies",
            "Kimmich",
            "Goretzka",
            "Coman",
            "Muller",
            "Gnarby",
            "Lewandowski",
          ],
          [
            "Burki",
            "Schulz",
            "Hummels",
            "Akanji",
            "Hakimi",
            "Weigl",
            "Witsel",
            "Hazard",
            "Brandt",
            "Sancho",
            "Gotze",
          ],
        ],
        score: "4:0",
        scored: ["Lewandowski", "Gnarby", "Lewandowski", "Hummels"],
        date: "Nov 9th, 2037",
        odds: {
          team1: 1.33,
          x: 3.25,
          team2: 6.5,
        },
      };

      // mảng cầu thủ mỗi đội
      const [players1, players2] = game.players;
      console.log("players1:", players1);
      console.log("players2:", players2);

      // thủ môn và cầu thủ sân đội 1
      const [gk, ...fieldPlayers] = players1;
      console.log("goalkeeper:", gk);
      console.log("field players:", fieldPlayers);

      // gộp cầu thủ 2 đội
      const allPlayers = [...players1, ...players2];
      console.log("all players:", allPlayers);

      // thêm 3 cầu thủ dự bị cho đội 1
      const players1Final = [...players1, "Thiago", "Coutinho", "Perisic"];
      console.log("players1Final:", players1Final);

      // tách odds ra biến riêng
      const {
        odds: { team1, x: draw, team2 },
      } = game;
      console.log("odds:", { team1, draw, team2 });

      // in cầu thủ ghi bàn + tổng số bàn
      const printGoals = function (...players) {
        console.log("Scorers:", players.join(", "));
        console.log(`${players.length} goals were scored`);
      };

      printGoals("Davies", "Muller", "Lewandowski", "Kimmich");
      printGoals(...game.scored);

      // rs
      team1 < team2 && console.log(`${game.team1} is more likely to win`);
      team2 < team1 && console.log(`${game.team2} is more likely to win`);
    </script>
  </body>
</html>
